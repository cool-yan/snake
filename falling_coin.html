<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title id="pageTitle">重力磁盘 · 陀螺仪终端</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🥏</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c08;
    --panel:#14160f;
    --panel2:#1a1d13;
    --border:#2b2f1f;
    --text:#e9e7da;
    --muted:#7d8169;
    --red:#ff4136;
    --green:#39d353;
    --blue:#4fb3ff;
    --font-display:'Space Grotesk', 'Inter', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    min-height:100vh;
    background-color:var(--bg);
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:26px 26px;
    color:var(--text);
    font-family:var(--font-body);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px;
    overflow: hidden;
  }

  .terminal{
    width:100%;
    max-width:440px;
    height: 92vh;
    max-height: 800px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
    box-shadow:0 0 60px rgba(79,179,255,.05), 0 20px 50px rgba(0,0,0,.6);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  header{ display:flex; align-items:center; gap:10px; margin-bottom:2px; position: relative;}

  .status-dot{
    width:10px; height:10px; border-radius:50%;
    background:var(--blue);
    box-shadow:0 0 8px var(--blue);
  }
  .status-dot.danger{ background:var(--red); box-shadow:0 0 12px var(--red); animation:blink 0.5s infinite; }
  @keyframes blink{ 50%{ opacity:0.3; } }

  h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:22px;
    letter-spacing:-.01em;
    text-shadow:0 0 15px rgba(79,179,255,.3);
  }

  .btn-pause-toggle {
    position: absolute;
    right: 0; top: 0;
    background: none; border: none;
    color: var(--muted); font-size: 20px;
    cursor: pointer; display: none;
  }
  .btn-pause-toggle:hover { color: var(--text); }

  .eyebrow{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:12px;
  }

  .canvas-container {
    flex: 1;
    position: relative;
    background: #0d0f0a;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .overlay {
    position: absolute;
    top:0; left:0; width:100%; height:100%;
    background: rgba(10,12,8,0.92);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px;
    text-align: center;
    z-index: 10;
    overflow-y: auto;
  }

  .overlay.hidden { display: none; }

  .menu-title {
    font-family:var(--font-display);
    font-size: 24px;
    color: var(--blue);
    margin-bottom: 6px;
  }

  .menu-desc {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    line-height: 1.5;
    max-width: 300px;
  }

  .settings-block {
    width: 100%;
    max-width: 280px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
    text-align: left;
  }
  
  .setting-row { margin-bottom: 12px; }
  .setting-row:last-child { margin-bottom: 0; }

  .setting-label {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .setting-label span.val { color: var(--blue); font-weight: bold; }

  .slider-container { display: flex; align-items: center; gap: 8px; }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    background: var(--panel);
    height: 6px;
    border-radius: 3px;
    border: 1px solid var(--border);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%; background: var(--blue);
    cursor: pointer;
  }

  .btn-mute {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px; font-size: 11px;
    border-radius: 4px; cursor: pointer;
    font-family: var(--font-body);
    min-width: 54px; text-align: center;
  }
  .btn-mute.active { background: var(--red); color: #0a0c08; border-color: var(--red); }

  .btn-primary{
    padding:12px 32px; border:none; border-radius:8px;
    background:var(--blue); color:#0a0c08; font-weight:700; font-size:14px;
    letter-spacing:.02em; cursor:pointer; font-family:var(--font-display);
    box-shadow:0 4px 15px rgba(79,179,255,.3);
    margin-bottom: 14px;
    transition: transform 0.1s;
  }
  .btn-primary:active{ transform: scale(0.96); }

  .pill-group{ display:inline-flex; gap:6px; background: var(--panel2); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
  .pill{
    padding:5px 12px; color:var(--muted); border-radius:6px;
    font-size:11px; font-family:var(--font-mono); cursor:pointer;
  }
  .pill.active{ background: var(--panel); color:var(--text); border: 1px solid var(--border); }

  .shake { animation: screenShake 0.15s infinite; }
  @keyframes screenShake {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(-4px, 3px); }
    75% { transform: translate(4px, -3px); }
  }
</style>
</head>
<body>

<div class="terminal" id="terminalNode">
  <header>
    <div class="status-dot" id="statusDot"></div>
    <h1 id="mainTitle">重力磁盘</h1>
    <button class="btn-pause-toggle" id="pauseToggleBtn">⚙️</button>
  </header>
  <div class="eyebrow" id="subtitle">协议 // 陀螺仪驱动 · 能量拦截矩阵</div>

  <div class="canvas-container">
    <canvas id="gameCanvas"></canvas>

    <div class="overlay" id="menuOverlay">
      <h2 class="menu-title" id="menuTitle">拦截准备</h2>
      <p class="menu-desc" id="menuDesc">倾斜手机或移动鼠标控制磁盘，收集能量金币，修复受损血量，避开致命炸弹。</p>
      
      <div class="settings-block">
        <div class="setting-row">
          <div class="setting-label">
            <span id="cfgLabelSens">最大控制角度</span>
            <span class="val" id="sensVal">45°</span>
          </div>
          <div class="slider-container">
            <input type="range" id="sensSlider" min="15" max="90" step="5" value="45">
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">
            <span id="cfgLabelVol">主音量</span>
            <span class="val" id="volVal">70%</span>
          </div>
          <div class="slider-container">
            <input type="range" id="volSlider" min="0" max="100" step="5" value="70">
            <button class="btn-mute" id="muteBtn">MUTE</button>
          </div>
        </div>
      </div>

      <button class="btn-primary" id="actionBtn">激活磁盘</button>
      
      <div class="pill-group" id="langGroup">
        <div class="pill active" data-value="zh">简体中文</div>
        <div class="pill" data-value="en">English</div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const BGM_URL        = "bgm.mp3";          
  const COIN_SFX_URL   = "coin.mp3";         
  const HEALTH_SFX_URL = "health.mp3";       
  const BOMB_SFX_URL   = "bomb.mp3";         

  const audioContext = {
    bgm: new Audio(BGM_URL),
    coin: new Audio(COIN_SFX_URL),
    health: new Audio(HEALTH_SFX_URL),
    bomb: new Audio(BOMB_SFX_URL)
  };
  audioContext.bgm.loop = true;

  const i18n = {
    zh: {
      pageTitle: "重力磁盘 · 陀螺仪终端",
      mainTitle: "重力磁盘",
      subtitle: "协议 // 陀螺仪驱动 · 能量拦截矩阵",
      startTitle: "拦截准备",
      startDesc: "倾斜手机（左右）或移动鼠标控制底部3D磁盘。收集金币与急救箱，躲避炸弹！",
      btnStart: "▶ 激活磁盘",
      btnRestart: "🔄 重新初始化",
      btnResume: "▶ 继续拦截",
      overTitle: "💥 矩阵崩溃",
      overDesc: "结构血量归零。最终拦截完整度分数: {score}",
      pauseTitle: "⏸ 拦截挂起",
      pauseDesc: "终端驱动暂停中。可在下方调整硬件参数。",
      uiScore: "积分 SCORE:",
      cfgSens: "最大控制角度",
      cfgVol: "主音量",
      btnMute: "静音"
    },
    en: {
      pageTitle: "Gravity Disk · Gyro Terminal",
      mainTitle: "Gravity Disk",
      subtitle: "PROTOCOL // GYRO INFRASTRUCTURE · ENERGY CAPTURE",
      startTitle: "READY TO LAUNCH",
      startDesc: "Tilt your device left/right or move mouse to slide the 3D disk. Collect coins & health packs, avoid bombs!",
      btnStart: "▶ Activate Disk",
      btnRestart: "🔄 Re-initialize",
      btnResume: "▶ Resume Matrix",
      overTitle: "💥 SYSTEM COLLAPSED",
      overDesc: "Structural integrity reached zero. Final synchronization score: {score}",
      pauseTitle: "⏸ SYSTEM PAUSED",
      pauseDesc: "Defusal suspension active. Re-calibrate hardware metrics below.",
      uiScore: "SCORE:",
      cfgSens: "Max Control Angle",
      cfgVol: "Master Volume",
      btnMute: "Mute"
    }
  };

  let currentLang = 'zh';

  let maxControlAngle = 45; 
  let volume = 0.7;       
  let isMuted = false;

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const terminalNode = document.getElementById('terminalNode');

  let gameState = 'START'; 
  let score = 0;
  let hp = 3;
  const maxHp = 3;

  const player = {
    x: 0,
    y: 0,
    width: 85,    
    height: 18,   
    thickness: 12, 
    targetX: 0    
  };

  let items = [];
  let lastSpawnTime = 0;
  let spawnInterval = 1000; 
  let globalSpeedFactor = 1.0; 
  let shakeTime = 0; 

  // ==========================================
  // 时流控制状态机与变色特效控制
  // ==========================================
  let timeDilation = 1.0;       
  let freezeFramesLeft = 0;     // 硬直停顿剩余帧
  let slowRecoverFramesLeft = 0;// 平滑恢复剩余帧
  const SLOW_DURATION = 40;     // 恢复周期

  function updateAudioSettings() {
    let targetVol = isMuted ? 0 : volume;
    audioContext.bgm.volume = targetVol;
    audioContext.coin.volume = targetVol;
    audioContext.health.volume = targetVol;
    audioContext.bomb.volume = targetVol;
  }

  function playSFX(type) {
    const sfx = audioContext[type];
    if (!sfx) return;
    sfx.currentTime = 0; 
    sfx.play().catch(()=>{});
  }

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    
    player.y = rect.height - 45;
    if (gameState === 'START') {
      player.x = rect.width / 2;
      player.targetX = rect.width / 2;
    }
  }
  window.addEventListener('resize', resizeCanvas);

  const sensSlider = document.getElementById('sensSlider');
  const sensVal = document.getElementById('sensVal');
  sensSlider.oninput = function() {
    maxControlAngle = parseInt(this.value, 10);
    sensVal.textContent = maxControlAngle + '°';
  };

  const volSlider = document.getElementById('volSlider');
  const volVal = document.getElementById('volVal');
  volSlider.oninput = function() {
    volume = parseInt(this.value) / 100;
    volVal.textContent = this.value + '%';
    updateAudioSettings();
  };

  const muteBtn = document.getElementById('muteBtn');
  muteBtn.onclick = function() {
    isMuted = !isMuted;
    this.classList.toggle('active', isMuted);
    updateAudioSettings();
  };

  function setupLanguage() {
    const pills = document.querySelectorAll('#langGroup .pill');
    pills.forEach(p => p.addEventListener('click', () => {
      pills.forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      currentLang = p.dataset.value;
      updateText();
    }));
  }

  function updateText() {
    const lang = i18n[currentLang];
    document.getElementById('pageTitle').textContent = lang.pageTitle;
    document.getElementById('mainTitle').textContent = lang.mainTitle;
    document.getElementById('subtitle').textContent = lang.subtitle;
    document.getElementById('cfgLabelSens').textContent = lang.cfgSens;
    document.getElementById('cfgLabelVol').textContent = lang.cfgVol;
    document.getElementById('muteBtn').textContent = lang.btnMute;
    
    if (gameState === 'START') {
      document.getElementById('menuTitle').textContent = lang.startTitle;
      document.getElementById('menuDesc').textContent = lang.startDesc;
      document.getElementById('actionBtn').textContent = lang.btnStart;
    } else if (gameState === 'GAMEOVER') {
      document.getElementById('menuTitle').textContent = lang.overTitle;
      document.getElementById('menuDesc').textContent = lang.overDesc.replace('{score}', score);
      document.getElementById('actionBtn').textContent = lang.btnRestart;
    } else if (gameState === 'PAUSED') {
      document.getElementById('menuTitle').textContent = lang.pauseTitle;
      document.getElementById('menuDesc').textContent = lang.pauseDesc;
      document.getElementById('actionBtn').textContent = lang.btnResume;
    }
  }

  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'RUNNING') return;
    const rect = canvas.getBoundingClientRect();
    player.targetX = e.clientX - rect.left;
  });

  canvas.addEventListener('touchmove', (e) => {
    if (gameState !== 'RUNNING') return;
    if(e.touches.length > 0) {
      const rect = canvas.getBoundingClientRect();
      player.targetX = e.touches[0].clientX - rect.left;
    }
    e.preventDefault();
  }, { passive: false });

  if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', (e) => {
      if (gameState !== 'RUNNING') return;
      let tilt = e.gamma; 
      if (tilt !== null && tilt !== undefined) {
        const rect = canvas.getBoundingClientRect();
        const minX = player.width * 0.5;
        const maxX = rect.width - player.width * 0.5;
        const centerX = rect.width / 2;
        const maxRange = centerX - minX;

        if(tilt > 90) tilt = 90;
        if(tilt < -90) tilt = -90;

        let ratio = tilt / maxControlAngle;
        if (ratio > 1) ratio = 1;
        if (ratio < -1) ratio = -1;

        player.targetX = centerX + ratio * maxRange;
      }
    }, true);
  }

  const pauseToggleBtn = document.getElementById('pauseToggleBtn');
  pauseToggleBtn.onclick = function() {
    if (gameState === 'RUNNING') {
      gameState = 'PAUSED';
      audioContext.bgm.pause(); 
      document.getElementById('menuOverlay').classList.remove('hidden');
      updateText();
    }
  };

  function spawnItem() {
    const rect = canvas.getBoundingClientRect();
    const x = Math.random() * (rect.width - 40) + 20;
    const y = -30;
    const speed = (Math.random() * 2 + 2.5) * globalSpeedFactor;
    
    const rand = Math.random();
    let type = 'coin';
    if (rand > 0.7 && rand <= 0.92) {
      type = 'bomb';
    } else if (rand > 0.92) {
      type = 'heart';
    }

    items.push({
      x, y, type, speed,
      rotX: Math.random() * Math.PI, 
      rotY: Math.random() * Math.PI,
      size: type === 'heart' ? 14 : 12
    });
  }

  // ==========================================
  // 🎮 增强变色渲染：3D 玩家磁盘绘制
  // ==========================================
  function draw3DPlayer(ctx, p) {
    ctx.save();
    const thickness = p.thickness;

    // 检查目前是否处于爆炸损伤反应期
    let isDamaged = freezeFramesLeft > 0 || slowRecoverFramesLeft > 25;
    // 如果受击，计算红白高频交替闪烁的色彩
    let isFlashFrame = Math.floor(Date.now() / 60) % 2 === 0;

    for(let i = thickness; i > 0; i--) {
      ctx.beginPath();
      let shade = 25 + (thickness - i) * 3;
      
      if (isDamaged) {
        // 💥 变色效果一：盘身厚度变为暗红色或亮红能量逆流色
        ctx.fillStyle = isFlashFrame ? `rgb(${shade + 110}, 15, 15)` : `rgb(${shade + 40}, 10, 10)`;
      } else {
        // 正常科技蓝
        ctx.fillStyle = `rgb(${shade}, ${shade + 15}, ${shade + 35})`;
      }

      ctx.ellipse(p.x, p.y + i, p.width, p.height, 0, 0, Math.PI * 2);
      ctx.fill();
      if (i === thickness) {
        ctx.strokeStyle = isDamaged ? 'rgba(255, 65, 54, 0.6)' : 'rgba(79,179,255,0.4)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    let topGrad = ctx.createRadialGradient(p.x, p.y - 5, 2, p.x, p.y, p.width);
    if (isDamaged) {
      // 💥 变色效果二：盘面主发光核心转化为警报红/纯白交替闪烁
      if (isFlashFrame) {
        topGrad.addColorStop(0, '#ffffff');
        topGrad.addColorStop(0.2, '#ff8a82');
        topGrad.addColorStop(0.6, '#9e140b');
        topGrad.addColorStop(1, '#300200');
      } else {
        topGrad.addColorStop(0, '#ff4136');
        topGrad.addColorStop(0.3, '#bc1a10');
        topGrad.addColorStop(0.8, '#4a0400');
        topGrad.addColorStop(1, '#110000');
      }
    } else {
      // 正常的经典蓝色发光渐变
      topGrad.addColorStop(0, '#ffffff'); 
      topGrad.addColorStop(0.1, '#66cbff');
      topGrad.addColorStop(0.4, '#1b3a4b');
      topGrad.addColorStop(1, '#0e1d26');
    }
    
    ctx.beginPath();
    ctx.fillStyle = topGrad;
    ctx.ellipse(p.x, p.y, p.width, p.height, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.strokeStyle = isDamaged ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 2;
    ctx.ellipse(p.x, p.y, p.width * 0.7, p.height * 0.7, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function draw3DItem(ctx, item) {
    ctx.save();
    ctx.translate(item.x, item.y);
    
    item.rotY += 0.04 * timeDilation;
    item.rotX += 0.02 * timeDilation;

    if (item.type === 'coin') {
      ctx.scale(Math.cos(item.rotY), 1); 
      ctx.beginPath();
      ctx.fillStyle = '#b58100';
      ctx.arc(0, 2, item.size, 0, Math.PI * 2);
      ctx.fill();

      let coinGrad = ctx.createRadialGradient(-3, -3, 1, 0, 0, item.size);
      coinGrad.addColorStop(0, '#fff3a1');
      coinGrad.addColorStop(0.5, '#ffb300');
      coinGrad.addColorStop(1, '#cca200');
      ctx.beginPath();
      ctx.fillStyle = coinGrad;
      ctx.arc(0, 0, item.size, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.beginPath();
      ctx.strokeStyle = '#e69d00';
      ctx.lineWidth = 1.5;
      ctx.arc(0, 0, item.size * 0.6, 0, Math.PI * 2);
      ctx.stroke();

    } else if (item.type === 'bomb') {
      let bombGrad = ctx.createRadialGradient(-4, -4, 2, 0, 0, item.size);
      bombGrad.addColorStop(0, '#ff7d75');
      bombGrad.addColorStop(0.4, '#ff4136');
      bombGrad.addColorStop(0.9, '#3a0906');
      bombGrad.addColorStop(1, '#140201');
      
      ctx.shadowColor = 'rgba(255, 65, 54, 0.4)';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.fillStyle = bombGrad;
      ctx.arc(0, 0, item.size, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.rotate(item.rotX);
      ctx.fillStyle = (Math.floor(Date.now() / 150) % 2 === 0) ? '#ffffff' : '#ff4136';
      ctx.fillRect(-item.size, -2, item.size * 2, 4);

    } else if (item.type === 'heart') {
      ctx.rotate(item.rotY * 0.5);
      ctx.fillStyle = '#1e5c27';
      ctx.fillRect(-item.size+2, -item.size+2, item.size*2, item.size*2);
      ctx.fillStyle = '#39d353';
      ctx.fillRect(-item.size, -item.size, item.size*2 - 2, item.size*2 - 2);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-item.size + 5, -2, item.size*2 - 12, 4);
      ctx.fillRect(-2, -item.size + 5, 4, item.size*2 - 12);
    }
    ctx.restore();
  }

  function drawHUD(rect) {
    const lang = i18n[currentLang];
    ctx.fillStyle = '#7d8169';
    ctx.font = `700 11px var(--font-mono)`;
    ctx.fillText(lang.uiScore, 16, 26);
    
    ctx.fillStyle = '#e9e7da';
    ctx.font = `700 24px var(--font-display)`;
    ctx.fillText(score, 16, 52);

    const startX = rect.width - 95;
    for (let i = 0; i < maxHp; i++) {
      ctx.save();
      if (i < hp) {
        let hpGrad = ctx.createLinearGradient(startX + i*26, 20, startX + i*26, 36);
        hpGrad.addColorStop(0, '#5eff82');
        hpGrad.addColorStop(1, '#229935');
        ctx.fillStyle = hpGrad;
        ctx.shadowColor = 'rgba(57,211,83,0.3)';
        ctx.shadowBlur = 6;
      } else {
        ctx.fillStyle = '#22251a';
      }
      ctx.beginPath();
      ctx.moveTo(startX + i * 26, 20);
      ctx.lineTo(startX + i * 26 + 20, 20);
      ctx.lineTo(startX + i * 26 + 15, 34);
      ctx.lineTo(startX + i * 26 - 5, 34);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  function update(time) {
    if (gameState !== 'RUNNING') return;

    const rect = canvas.getBoundingClientRect();

    if (shakeTime > 0) {
      shakeTime--;
      if (shakeTime === 0) terminalNode.classList.remove('shake');
    }

    // ==========================================
    // ⌛ 时间调节器状态演算
    // ==========================================
    if (freezeFramesLeft > 0) {
      // 1. 硬直卡肉停顿阶段：把流速降到绝对极低值
      timeDilation = 0.02; 
      freezeFramesLeft--;
      if (freezeFramesLeft === 0) {
        slowRecoverFramesLeft = SLOW_DURATION; 
      }
    } else if (slowRecoverFramesLeft > 0) {
      // 2. 停顿解除后的平滑缓动恢复阶段
      slowRecoverFramesLeft--;
      let progress = (SLOW_DURATION - slowRecoverFramesLeft) / SLOW_DURATION;
      timeDilation = 0.3 + (0.7 * progress); 
    } else {
      timeDilation = 1.0;
    }

    const minX = player.width * 0.5;
    const maxX = rect.width - player.width * 0.5;

    if (player.targetX < minX) player.targetX = minX;
    if (player.targetX > maxX) player.targetX = maxX;

    let followSpeed = 0.32 * (0.4 + 0.6 * timeDilation);
    player.x += (player.targetX - player.x) * followSpeed;
    
    if (player.x < minX) player.x = minX;
    if (player.x > maxX) player.x = maxX;

    globalSpeedFactor = 1.0 + (score / 150);
    spawnInterval = Math.max(500, 1000 - (score * 1.5));

    if (time - lastSpawnTime > spawnInterval * (1 / timeDilation)) {
      spawnItem();
      lastSpawnTime = time;
    }

    for (let i = items.length - 1; i >= 0; i--) {
      let it = items[i];
      it.y += it.speed * timeDilation;

      let dx = it.x - player.x;
      let dy = it.y - player.y;
      
      let distanceCheck = (dx * dx) / (player.width * player.width) + (dy * dy) / (player.height * player.height);
      let inThickness = it.y >= player.y && it.y <= player.y + player.thickness && Math.abs(dx) <= player.width;

      if (distanceCheck <= 1.1 || inThickness) {
        if (it.type === 'coin') {
          score += 10;
          playSFX('coin'); 
        } else if (it.type === 'bomb') {
          hp--;
          playSFX('bomb'); 
          shakeTime = 16; 
          terminalNode.classList.add('shake');
          document.getElementById('statusDot').className = 'status-dot danger';
          
          // ✨ 调整：将强烈的定格硬直时间提高到 8 帧，增强麻痹卡顿感
          freezeFramesLeft = 8; 

          setTimeout(() => {
            if(gameState === 'RUNNING') document.getElementById('statusDot').className = 'status-dot';
          }, 300);
          
          if (hp <= 0) {
            triggerGameOver();
          }
        } else if (it.type === 'heart') {
          if (hp < maxHp) {
            hp++;
            playSFX('health'); 
          }
        }
        items.splice(i, 1);
        continue;
      }

      if (it.y > rect.height + 40) {
        items.splice(i, 1);
      }
    }

    ctx.clearRect(0, 0, rect.width, rect.height);
    items.forEach(it => draw3DItem(ctx, it));
    draw3DPlayer(ctx, player); // 传入进行变色判定和刷新
    drawHUD(rect);

    requestAnimationFrame(update);
  }

  function triggerGameOver() {
    gameState = 'GAMEOVER';
    audioContext.bgm.pause(); 
    document.getElementById('pauseToggleBtn').style.display = 'none';
    document.getElementById('statusDot').className = 'status-dot danger';
    document.getElementById('menuOverlay').classList.remove('hidden');
    updateText();
  }

  document.getElementById('actionBtn').onclick = function() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(permissionState => {
          initGameStartOrResume();
        })
        .catch(() => initGameStartOrResume());
    } else {
      initGameStartOrResume();
    }
  };

  function initGameStartOrResume() {
    if (gameState === 'PAUSED') {
      gameState = 'RUNNING';
      document.getElementById('menuOverlay').classList.add('hidden');
      audioContext.bgm.play().catch(()=>{}); 
      lastSpawnTime = performance.now();
      requestAnimationFrame(update);
      return;
    }

    score = 0;
    hp = maxHp;
    items = [];
    timeDilation = 1.0;
    freezeFramesLeft = 0;
    slowRecoverFramesLeft = 0;
    gameState = 'RUNNING';
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('menuOverlay').classList.add('hidden');
    document.getElementById('pauseToggleBtn').style.display = 'block'; 
    
    updateAudioSettings();
    audioContext.bgm.currentTime = 0;
    audioContext.bgm.play().catch(()=>{});

    const rect = canvas.getBoundingClientRect();
    player.x = rect.width / 2;
    player.targetX = rect.width / 2;
    lastSpawnTime = performance.now();
    
    requestAnimationFrame(update);
  }

  resizeCanvas();
  setupLanguage();
  updateText();
  updateAudioSettings(); 
  update(0);

})();
</script>
</body>

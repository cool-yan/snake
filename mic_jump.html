<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title id="pageTitle">声波矩阵 · 旋律音高终端</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🎵</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c08;
    --panel:#14160f;
    --panel2:#1a1d13;
    --border:#2b2f1f;
    --text:#e9e7da;
    --muted:#7d8169;
    --red:#ff4136;
    --green:#39d353;
    --blue:#4fb3ff;
    --font-display:'Space Grotesk', 'Inter', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    min-height:100vh;
    background-color:var(--bg);
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:26px 26px;
    color:var(--text);
    font-family:var(--font-body);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px;
    overflow: hidden;
  }

  .terminal{
    width:100%;
    max-width:440px;
    height: 92vh;
    max-height: 800px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
    box-shadow:0 0 60px rgba(57,211,83,.05), 0 20px 50px rgba(0,0,0,.6);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  header{ display:flex; align-items:center; gap:10px; margin-bottom:2px; position: relative;}

  .status-dot{
    width:10px; height:10px; border-radius:50%;
    background:var(--green);
    box-shadow:0 0 8px var(--green);
  }
  .status-dot.danger{ background:var(--red); box-shadow:0 0 12px var(--red); animation:blink 0.5s infinite; }
  @keyframes blink{ 50%{ opacity:0.3; } }

  h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:22px;
    letter-spacing:-.01em;
    text-shadow:0 0 15px rgba(57,211,83,.3);
  }

  .btn-pause-toggle {
    position: absolute;
    right: 0; top: 0;
    background: none; border: none;
    color: var(--muted); font-size: 20px;
    cursor: pointer; display: none;
  }
  .btn-pause-toggle:hover { color: var(--text); }

  .eyebrow{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:12px;
  }

  .canvas-container {
    flex: 1;
    position: relative;
    background: #0d0f0a;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .overlay {
    position: absolute;
    top:0; left:0; width:100%; height:100%;
    background: rgba(10,12,8,0.94);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px;
    text-align: center;
    z-index: 10;
    overflow-y: auto;
  }

  .overlay.hidden { display: none; }

  .menu-title {
    font-family:var(--font-display);
    font-size: 24px;
    color: var(--green);
    margin-bottom: 6px;
  }

  .menu-desc {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    line-height: 1.5;
    max-width: 320px;
  }

  .settings-block {
    width: 100%;
    max-width: 280px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
    text-align: left;
  }
  
  .setting-row { margin-bottom: 12px; }
  .setting-row:last-child { margin-bottom: 0; }

  .setting-label {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .setting-label span.val { color: var(--green); font-weight: bold; }

  .slider-container { display: flex; align-items: center; gap: 8px; }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    background: var(--panel);
    height: 6px;
    border-radius: 3px;
    border: 1px solid var(--border);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%; background: var(--green);
    cursor: pointer;
  }

  .btn-primary{
    padding:12px 32px; border:none; border-radius:8px;
    background:var(--green); color:#0a0c08; font-weight:700; font-size:14px;
    letter-spacing:.02em; cursor:pointer; font-family:var(--font-display);
    box-shadow:0 4px 15px rgba(57,211,83,.3);
    margin-bottom: 14px;
    transition: transform 0.1s;
  }
  .btn-primary:active{ transform: scale(0.96); }

  .pill-group{ display:inline-flex; gap:6px; background: var(--panel2); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
  .pill{
    padding:5px 12px; color:var(--muted); border-radius:6px;
    font-size:11px; font-family:var(--font-mono); cursor:pointer;
  }
  .pill.active{ background: var(--panel); color:var(--text); border: 1px solid var(--border); }

  .shake { animation: screenShake 0.15s infinite; }
  @keyframes screenShake {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(-4px, 3px); }
    75% { transform: translate(4px, -3px); }
  }
</style>
</head>
<body>

<div class="terminal" id="terminalNode">
  <header>
    <div class="status-dot" id="statusDot"></div>
    <h1 id="mainTitle">声波矩阵</h1>
    <button class="btn-pause-toggle" id="pauseToggleBtn">⚙️</button>
  </header>
  <div class="eyebrow" id="subtitle">协议 // 音频声络驱动 · 旋律音高检测终端</div>

  <div class="canvas-container">
    <canvas id="gameCanvas"></canvas>

    <div class="overlay" id="menuOverlay">
      <h2 class="menu-title" id="menuTitle">旋律校准准备</h2>
      <p class="menu-desc" id="menuDesc">哼唱不同音高（Do Re Mi Fa...）来控制磁盘高度！唱低音盘子下降，唱高音盘子上升。下方可自由对齐你的个人音域。</p>
      
      <div class="settings-block">
        <div class="setting-row">
          <div class="setting-label">
            <span id="cfgLabelSens">音域基准中心 (男低音~女高音)</span>
            <span class="val" id="sensVal">180 Hz</span>
          </div>
          <div class="slider-container">
            <input type="range" id="sensSlider" min="100" max="400" step="10" value="180">
          </div>
        </div>
      </div>

      <button class="btn-primary" id="actionBtn">激活音讯分析器</button>
      
      <div class="pill-group" id="langGroup">
        <div class="pill active" data-value="zh">简体中文</div>
        <div class="pill" data-value="en">English</div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const i18n = {
    zh: {
      pageTitle: "声波矩阵 · 旋律音高终端",
      mainTitle: "声波矩阵",
      subtitle: "协议 // 音频声络驱动 · 旋律音高检测终端",
      startTitle: "旋律校准准备",
      startDesc: "通过哼唱音高来精准定位磁盘的高度！唱低音（Do）盘子往下降，唱高音（Sol）盘子往上升。请调整下方滑块以自适应你的声线音域。",
      btnStart: "▶ 激活音讯分析器",
      btnRestart: "🔄 重新初始化驱动",
      btnResume: "▶ 恢复音频捕捉",
      overTitle: "💥 核心频率熔断",
      overDesc: "拦截屏障生命归零。最终频率对齐分数: {score}",
      pauseTitle: "⏸ 采样挂起",
      pauseDesc: "基频捕获暂停。可在下方调整音域频率基准。",
      uiScore: "积分 SCORE:",
      cfgSens: "音域基准中心"
    },
    en: {
      pageTitle: "Sonic Matrix · Pitch Tracking Terminal",
      mainTitle: "Sonic Matrix",
      subtitle: "PROTOCOL // AUDIO INFRASTRUCTURE · PITCH FREQUENCY INTERACTION",
      startTitle: "MELODY CALIBRATION",
      startDesc: "Sing or hum notes (Do Re Mi...) to map the disk height! Low pitches drop the disk, high pitches lift it. Calibrate the slider below to fit your vocal register.",
      btnStart: "▶ Activate Pitch Analyzer",
      btnRestart: "🔄 Re-initialize Driver",
      btnResume: "▶ Resume Pitch Tracking",
      overTitle: "💥 CORE OSCILLATION OVERFLOW",
      overDesc: "Matrix collapsed. Final acoustic synchronization score: {score}",
      pauseTitle: "⏸ SAMPLING SUSPENDED",
      pauseDesc: "Frequency capturing paused. Adjust your base vocal octave range below.",
      uiScore: "SCORE:",
      cfgSens: "Base Pitch Center"
    }
  };

  let currentLang = 'zh';
  let baseHzCenter = 180; // 默认男高音/女低音均衡基准 (Hz)

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const terminalNode = document.getElementById('terminalNode');

  let gameState = 'START'; 
  let score = 0;
  let hp = 3;
  const maxHp = 3;

  // Web Audio 与 Pitch Detection 核心变量
  let audioCtx = null;
  let analyser = null;
  let microphone = null;
  let buf = new Float32Array(1024); // 时域缓冲区
  let currentTargetY = 200; // 由当前声音音高映射算出的目标位置
  let lastValidPitch = 180; // 锁定最后的有效音高，防止噪音干扰突然归零

  // 玩家状态（横向固定，纵向由音高绝对控制）
  const player = {
    x: 90,
    y: 200,
    width: 60,
    height: 14,
    thickness: 10,
    easeSpeed: 0.15 // 缓动跟随速度，数值越大跟随音高跃动越敏捷
  };

  let items = [];
  let lastSpawnTime = 0;
  let spawnInterval = 1200;
  let globalSpeedFactor = 1.0;
  let shakeTime = 0;

  // 受击卡肉停顿状态控制
  let timeDilation = 1.0;
  let freezeFramesLeft = 0;
  let slowRecoverFramesLeft = 0;
  const SLOW_DURATION = 35;

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    if(gameState === 'START') {
      player.y = rect.height / 2;
      currentTargetY = rect.height / 2;
    }
  }
  window.addEventListener('resize', resizeCanvas);

  const sensSlider = document.getElementById('sensSlider');
  const sensVal = document.getElementById('sensVal');
  sensSlider.oninput = function() {
    baseHzCenter = parseInt(this.value, 10);
    sensVal.textContent = baseHzCenter + ' Hz';
  };

  function setupLanguage() {
    const pills = document.querySelectorAll('#langGroup .pill');
    pills.forEach(p => p.addEventListener('click', () => {
      pills.forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      currentLang = p.dataset.value;
      updateText();
    }));
  }

  function updateText() {
    const lang = i18n[currentLang];
    document.getElementById('pageTitle').textContent = lang.pageTitle;
    document.getElementById('mainTitle').textContent = lang.mainTitle;
    document.getElementById('subtitle').textContent = lang.subtitle;
    document.getElementById('cfgLabelSens').textContent = lang.cfgSens;
    
    if (gameState === 'START') {
      document.getElementById('menuTitle').textContent = lang.startTitle;
      document.getElementById('menuDesc').textContent = lang.startDesc;
      document.getElementById('actionBtn').textContent = lang.btnStart;
    } else if (gameState === 'GAMEOVER') {
      document.getElementById('menuTitle').textContent = lang.overTitle;
      document.getElementById('menuDesc').textContent = lang.overDesc.replace('{score}', score);
      document.getElementById('actionBtn').textContent = lang.btnRestart;
    } else if (gameState === 'PAUSED') {
      document.getElementById('menuTitle').textContent = lang.pauseTitle;
      document.getElementById('menuDesc').textContent = lang.pauseDesc;
      document.getElementById('actionBtn').textContent = lang.btnResume;
    }
  }

  const pauseToggleBtn = document.getElementById('pauseToggleBtn');
  pauseToggleBtn.onclick = function() {
    if (gameState === 'RUNNING') {
      gameState = 'PAUSED';
      if(audioCtx) audioCtx.suspend();
      document.getElementById('menuOverlay').classList.remove('hidden');
      updateText();
    }
  };

  async function initAudioFeed() {
    if (audioCtx) return true;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048; // 足够大的采样率保证基频分析准确度
      microphone = audioCtx.createMediaStreamSource(stream);
      microphone.connect(analyser);
      return true;
    } catch (err) {
      alert("麦克风初始化失败，请确保授予权限！");
      return false;
    }
  }

  // ===================================================
  // 🔬 核心自相关时域算法 (Autocorrelation Pitch Detection)
  // ===================================================
  function detectPitch() {
    if (!analyser) return;
    analyser.getFloatTimeDomainData(buf);
    
    // 1. 计算信号均方根值 (检查音量是否太微弱，过滤静音及背景杂音)
    let rms = 0;
    for (let i = 0; i < buf.length; i++) {
      rms += buf[i] * buf[i];
    }
    rms = Math.sqrt(rms / buf.length);
    if (rms < 0.015) return; // 声音太小，判定为未发声，磁盘停在原位

    // 2. 信号裁剪过滤
    let r1 = 0, r2 = buf.length - 1, thres = 0.2;
    for (let i = 0; i < buf.length / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
    for (let i = buf.length - 1; i > buf.length / 2; i--) if (Math.abs(buf[i]) < thres) { r2 = i; break; }
    let slicedBuf = buf.subarray(r1, r2);

    // 3. 自相关公式计算周期
    let c = new Float32Array(slicedBuf.length);
    for (let i = 0; i < slicedBuf.length; i++) {
      for (let j = 0; j < slicedBuf.length - i; j++) {
        c[i] += slicedBuf[j] * slicedBuf[j + i];
      }
    }

    // 寻找自相关图中的第一个主峰值
    let d = 0;
    while (c[d] > c[d + 1]) d++;
    let maxval = -1, maxpos = -1;
    for (let i = d; i < c.length; i++) {
      if (c[i] > maxval) {
        maxval = c[i];
        maxpos = i;
      }
    }

    // 通过周期换算对应频率 (Hz)
    let T = maxpos;
    if (T > 0) {
      let pitchHz = audioCtx.sampleRate / T;
      // 人类声带哼唱的合理声乐基频范围一般在 60Hz ~ 1200Hz 之间
      if (pitchHz > 60 && pitchHz < 1200) {
        lastValidPitch = pitchHz;
      }
    }

    // 4. 将频率平滑映射成屏幕上的绝对Y轴坐标 (适应设定的自适应音域)
    const rect = canvas.getBoundingClientRect();
    // 设定一个音域跨度：允许围绕音域基准中心上下浮动 1.2 个倍频程
    let minPitchHz = baseHzCenter * 0.5;
    let maxPitchHz = baseHzCenter * 2.0;

    // 对数映射法（符合人耳对音高的线性感知）
    let logMin = Math.log2(minPitchHz);
    let logMax = Math.log2(maxPitchHz);
    let logCurrent = Math.log2(lastValidPitch);

    let ratio = (logCurrent - logMin) / (logMax - logMin);
    if (ratio < 0) ratio = 0;
    if (ratio > 1) ratio = 1;

    // 唱高音 (ratio趋近1) 对应屏幕顶部 (Y值小)，唱低音 (ratio趋近0) 对应屏幕底部 (Y值大)
    currentTargetY = (rect.height - 100) - ratio * (rect.height - 140) + 40;
  }

  function spawnItem() {
    const rect = canvas.getBoundingClientRect();
    const x = rect.width + 40;
    const y = Math.random() * (rect.height - 120) + 60;
    const speed = (Math.random() * 1.5 + 2.5) * globalSpeedFactor;
    
    const rand = Math.random();
    let type = 'coin';
    if (rand > 0.65 && rand <= 0.90) {
      type = 'bomb';
    } else if (rand > 0.90) {
      type = 'heart';
    }

    items.push({
      x, y, type, speed,
      rotX: Math.random() * Math.PI, 
      rotY: Math.random() * Math.PI,
      size: type === 'heart' ? 12 : 10
    });
  }

  function draw3DPlayer(ctx, p) {
    ctx.save();
    const thickness = p.thickness;
    let isDamaged = freezeFramesLeft > 0 || slowRecoverFramesLeft > 22;
    let isFlashFrame = Math.floor(Date.now() / 60) % 2 === 0;

    for(let i = thickness; i > 0; i--) {
      ctx.beginPath();
      let shade = 25 + (thickness - i) * 3;
      if (isDamaged) {
        ctx.fillStyle = isFlashFrame ? `rgb(${shade + 120}, 15, 15)` : `rgb(${shade + 40}, 10, 10)`;
      } else {
        ctx.fillStyle = `rgb(${shade}, ${shade + 35}, ${shade + 15})`;
      }
      ctx.ellipse(p.x, p.y + i, p.width, p.height, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    let topGrad = ctx.createRadialGradient(p.x, p.y - 4, 2, p.x, p.y, p.width);
    if (isDamaged) {
      topGrad.addColorStop(0, isFlashFrame ? '#ffffff' : '#ff4136');
      topGrad.addColorStop(0.4, '#9e140b');
      topGrad.addColorStop(1, '#110000');
    } else {
      topGrad.addColorStop(0, '#ffffff'); 
      topGrad.addColorStop(0.15, '#6eff8a');
      topGrad.addColorStop(0.5, '#164b23');
      topGrad.addColorStop(1, '#08210e');
    }
    
    ctx.beginPath();
    ctx.fillStyle = topGrad;
    ctx.ellipse(p.x, p.y, p.width, p.height, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function draw3DItem(ctx, item) {
    ctx.save();
    ctx.translate(item.x, item.y);
    item.rotY += 0.04 * timeDilation;

    if (item.type === 'coin') {
      ctx.scale(Math.cos(item.rotY), 1);
      let coinGrad = ctx.createRadialGradient(-2, -2, 1, 0, 0, item.size);
      coinGrad.addColorStop(0, '#fff3a1');
      coinGrad.addColorStop(0.6, '#ffb300');
      coinGrad.addColorStop(1, '#b58100');
      ctx.beginPath(); ctx.fillStyle = coinGrad;
      ctx.arc(0, 0, item.size, 0, Math.PI * 2); ctx.fill();
    } else if (item.type === 'bomb') {
      let bombGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, item.size);
      bombGrad.addColorStop(0, '#ff7d75'); bombGrad.addColorStop(0.5, '#ff4136'); bombGrad.addColorStop(1, '#140201');
      ctx.beginPath(); ctx.fillStyle = bombGrad;
      ctx.arc(0, 0, item.size, 0, Math.PI * 2); ctx.fill();
    } else if (item.type === 'heart') {
      ctx.rotate(item.rotY * 0.5);
      ctx.fillStyle = '#39d353'; ctx.fillRect(-item.size, -item.size, item.size*2, item.size*2);
      ctx.fillStyle = '#ffffff'; ctx.fillRect(-item.size+4, -1, item.size*2-8, 2); ctx.fillRect(-1, -item.size+4, 2, item.size*2-8);
    }
    ctx.restore();
  }

  // 绘制顶部的音高提示辅助状态指示线
  function drawPitchGuideHUD(rect) {
    if(gameState !== 'RUNNING') return;
    ctx.save();
    ctx.strokeStyle = 'rgba(57, 211, 83, 0.2)';
    ctx.setLineDash([4, 4]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(15, currentTargetY);
    ctx.lineTo(rect.width - 15, currentTargetY);
    ctx.stroke();

    ctx.fillStyle = 'rgba(57, 211, 83, 0.6)';
    ctx.font = '10px var(--font-mono)';
    ctx.fillText(`PITCH: ${Math.round(lastValidPitch)}Hz`, 16, currentTargetY - 6);
    ctx.restore();
  }

  function drawHUD(rect) {
    const lang = i18n[currentLang];
    ctx.fillStyle = '#7d8169';
    ctx.font = `700 11px var(--font-mono)`;
    ctx.fillText(lang.uiScore, 16, 26);
    ctx.fillStyle = '#e9e7da';
    ctx.font = `700 24px var(--font-display)`;
    ctx.fillText(score, 16, 52);

    const startX = rect.width - 95;
    for (let i = 0; i < maxHp; i++) {
      ctx.fillStyle = (i < hp) ? '#39d353' : '#22251a';
      ctx.beginPath();
      ctx.moveTo(startX + i * 26, 20); ctx.lineTo(startX + i * 26 + 20, 20);
      ctx.lineTo(startX + i * 26 + 15, 34); ctx.lineTo(startX + i * 26 - 5, 34);
      ctx.closePath(); ctx.fill();
    }
  }

  function update(time) {
    if (gameState !== 'RUNNING') return;
    const rect = canvas.getBoundingClientRect();

    if (shakeTime > 0) {
      shakeTime--;
      if (shakeTime === 0) terminalNode.classList.remove('shake');
    }

    // 时间流速计算
    if (freezeFramesLeft > 0) {
      timeDilation = 0.02; freezeFramesLeft--;
      if (freezeFramesLeft === 0) slowRecoverFramesLeft = SLOW_DURATION;
    } else if (slowRecoverFramesLeft > 0) {
      slowRecoverFramesLeft--;
      let progress = (SLOW_DURATION - slowRecoverFramesLeft) / SLOW_DURATION;
      timeDilation = 0.3 + (0.7 * progress);
    } else {
      timeDilation = 1.0;
    }

    // 执行音高定位运算
    detectPitch();

    // 核心物理：使盘子平滑地 Lerp 逼近音高决定的绝对高度，缓动受时滞因素相应变沉
    let currentEase = player.easeSpeed * (0.3 + 0.7 * timeDilation);
    player.y += (currentTargetY - player.y) * currentEase;

    globalSpeedFactor = 1.0 + (score / 180);
    spawnInterval = Math.max(600, 1200 - (score * 1.2));

    if (time - lastSpawnTime > spawnInterval * (1 / timeDilation)) {
      spawnItem();
      lastSpawnTime = time;
    }

    for (let i = items.length - 1; i >= 0; i--) {
      let it = items[i];
      it.x -= it.speed * timeDilation;

      let dx = it.x - player.x;
      let dy = it.y - player.y;
      
      let hitCheck = (dx * dx) / (player.width * player.width) + (dy * dy) / (player.height * player.height);

      if (hitCheck <= 1.2) {
        if (it.type === 'coin') {
          score += 10;
        } else if (it.type === 'bomb') {
          hp--;
          shakeTime = 16;
          terminalNode.classList.add('shake');
          document.getElementById('statusDot').className = 'status-dot danger';
          freezeFramesLeft = 8; // 8帧强烈卡肉闪烁变色

          setTimeout(() => {
            if(gameState === 'RUNNING') document.getElementById('statusDot').className = 'status-dot';
          }, 300);
          
          if (hp <= 0) triggerGameOver();
        } else if (it.type === 'heart') {
          if (hp < maxHp) hp++;
        }
        items.splice(i, 1);
        continue;
      }

      if (it.x < -40) {
        items.splice(i, 1);
      }
    }

    ctx.clearRect(0, 0, rect.width, rect.height);
    drawPitchGuideHUD(rect); // 绘制当前音高高度指示器虚线
    items.forEach(it => draw3DItem(ctx, it));
    draw3DPlayer(ctx, player);
    drawHUD(rect);

    requestAnimationFrame(update);
  }

  function triggerGameOver() {
    gameState = 'GAMEOVER';
    if(audioCtx) audioCtx.suspend();
    document.getElementById('pauseToggleBtn').style.display = 'none';
    document.getElementById('statusDot').className = 'status-dot danger';
    document.getElementById('menuOverlay').classList.remove('hidden');
    updateText();
  }

  document.getElementById('actionBtn').onclick = async function() {
    let success = await initAudioFeed();
    if (!success) return;

    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }

    if (gameState === 'PAUSED') {
      gameState = 'RUNNING';
      document.getElementById('menuOverlay').classList.add('hidden');
      lastSpawnTime = performance.now();
      requestAnimationFrame(update);
      return;
    }

    score = 0; hp = maxHp; items = [];
    timeDilation = 1.0; freezeFramesLeft = 0; slowRecoverFramesLeft = 0;
    gameState = 'RUNNING';
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('menuOverlay').classList.add('hidden');
    document.getElementById('pauseToggleBtn').style.display = 'block';

    const rect = canvas.getBoundingClientRect();
    player.y = rect.height / 2;
    currentTargetY = rect.height / 2;
    lastSpawnTime = performance.now();
    
    requestAnimationFrame(update);
  };

  resizeCanvas();
  setupLanguage();
  updateText();
  update(0);
})();
</script>
</body>
</html>
